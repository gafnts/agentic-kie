name: CD

on:
  push:
    tags:
      - "v*"

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git branch -r --contains "$GITHUB_SHA" | grep -qE 'origin/main$' \
            || { echo "::error::Tag must point to a commit on main"; exit 1; }

  lint-and-type-check:
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --all-extras --frozen

      - name: Run ruff check
        run: uv run ruff check

      - name: Run ruff format
        run: uv run ruff format --check

      - name: Run mypy
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --all-extras --frozen

      - name: Run tests
        run: uv run pytest --cov --cov-branch

  publish:
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test]
    permissions:
      id-token: write
      contents: write
    environment: pypi
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
