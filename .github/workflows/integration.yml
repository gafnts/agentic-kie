name: Integration Tests

on:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --all-extras --frozen

      - name: Run integration tests
        env:
          INTEGRATION_API_KEY: ${{ secrets.INTEGRATION_API_KEY }}
        run: uv run pytest -m integration -v --timeout=120
